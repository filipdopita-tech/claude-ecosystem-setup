# =========================
# COMMANDS
# =========================
commands:
  ssh_flash: "ssh root@10.X.0.1"
  ssh_alfa: "ssh root@YOUR_ALFA_VPS_PUBLIC_IP"
  ssh_mac_from_flash: "ssh mac  # = 10.X.0.2"
  mount_mac: "/mac  # automounted via SSHFS"
  systemctl_restart: "ssh root@10.X.0.1 'systemctl restart {service}'"
  monit_reload: "ssh root@10.X.0.1 'monit reload'"

