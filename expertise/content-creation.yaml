domain: content-creation
last_updated: 2026-04-09
description: IG/LinkedIn/newsletter content strategy, algorithm, structures, hooks

# =========================
# ALGORITHM 2026
# =========================
ig_algorithm:
  priority_order:
    1: watch_time
    2: sends
    3: likes
    4: comments
    5: saves
  engagement_rate_by_format:
    carousel: "10% (best)"
    reel: "7%"
    static: "3%"

posting_mix_weekly:
  reels: 3-4
  carousels: 2-3
  static: 1-2

posting_times_cz:
  ig:
    days: [tuesday, wednesday, thursday]
    windows: ["12:00-13:00", "19:00-21:00"]
  newsletter:
    days: [tuesday, wednesday]
    windows: ["07:00-09:00"]
  linkedin:
    days: [tuesday, wednesday, thursday]
    windows: ["08:00-10:00", "17:00-18:00"]

# =========================
# CONTENT STRUCTURES
# =========================
carousel_structure:
  slides: 7
  format:
    slide_1_hook: "Max 7 slov, 1 cislo nebo provokace"
    slide_2_problem: "Max 18 slov, konkretni bolest"
    slide_3_reseni: "Prime, bez vodovky"
    slide_4_dukaz: "Cisla, case study, data"
    slide_5_jak: "Step-by-step (3 kroky max)"
    slide_6_priklad: "Real scenario"
    slide_7_cta: "Comment KEYWORD + Save"
  word_limit_per_slide: 18
  visual:
    bg: "#0f1113"
    text: "#ffffff"
    accent: "#cdb186"
    font: Inter
    weights_max: 2

reel_structure:
  duration_sec: 15-30
  hook_duration_sec: 0-3
  structure:
    - "0-3s: Hook (curiosity gap / stat / provokace)"
    - "3-8s: Setup (proc to matter)"
    - "8-22s: Value (3 body, 1 cislo)"
    - "22-30s: CTA (Comment KEYWORD)"
  script_rules:
    - Zadny intro "Ahoj, jsem Filip..."
    - Jet rovnou do hodnoty
    - Prvni 3 slova = HOOK
    - Posledni slova = CTA

static_post_structure:
  caption_length_ig: 150-300_znaku
  caption_length_linkedin: 1200-1500_znaku
  structure:
    - Hook (1 veta, vyjimecna)
    - Value (2-3 body)
    - CTA
  hashtags_ig: 10-15
  hashtags_linkedin: 3-5

# =========================
# HOOK FORMULAS
# =========================
hook_formulas:
  curiosity_gap: "X vetsinu investoru o Y neco nevi"
  relatable_pain: "Kdyz jsem poprve videl {problem}, stalo me to {cena}"
  pattern_interrupt: "Vsechny knihy o {topic} se mylí"
  stat_bomb: "{cislo} ceskych investoru {akce}. Jsi jeden z nich?"
  urgent_command: "Prestan delat {bezna_chyba}. Tady je proc."
  contrarian: "Nikdo to nerika nahlas, ale {unpopular_truth}"
  in_medias_res: "Zrovna jsem dokoncil {action}. Tady jsou zjisteni."

# =========================
# STORYBRAND FRAMEWORK
# =========================
storybrand:
  hero: investor_czech_500k_plus
  problem: rozdrobena_investice_neprehlednost_ceskeho_trhu
  guide: OneFlow
  plan:
    - konzultace
    - vyber_prilezitosti
    - investice_s_DD
  call_to_action: primary_rezervace_konzultace
  transitional_call_to_action: newsletter_subscription
  success: diverzifikovane_portfolio_clear_track_record
  failure: spatna_investice_ztrata_kapitalu

# =========================
# AARRR FUNNEL
# =========================
aarrr:
  acquisition:
    channels: [ig, linkedin, newsletter_referral, organic_search]
    ig_flow: "reel -> bio -> magnet (free guide) -> email"
  activation:
    sequence: "5-email welcome series over 10 days"
    first_value: "Within 24 hours of signup"
  retention:
    newsletter_cadence: "2x weekly"
    ig_cadence: "daily presence (stories + feed)"
  referral:
    mechanism: "invite friend = free DD consult"
  revenue:
    primary: "investment placement fee"
    secondary: "fundraising advisory"

# =========================
# REPURPOSING MATRIX
# =========================
repurpose_matrix:
  source_pillar_content:
    outputs:
      - ig_reel_30s
      - ig_carousel_7slides
      - ig_static_post
      - ig_stories_series
      - linkedin_long_post
      - newsletter_deep_dive
      - blog_article
      - pdf_lead_magnet
      - video_youtube_long

# =========================
# BANNED PATTERNS (AI slop)
# =========================
ai_slop_patterns:
  - "Seznamy s presne 5 nebo 10 polozkami"
  - "Furthermore / Moreover slova"
  - "Uniform sentence length (all 12 words)"
  - "Em dash abuse"
  - "It's important to note that fraze"
  - "In conclusion fraze"
  - "Balance between formal + informal (znak AI)"

# =========================
# KPI BENCHMARKS
# =========================
kpi:
  ig:
    good_save_rate: "3-5%"
    good_share_rate: "1-2%"
    good_engagement_rate: "6-10%"
  email:
    good_open_rate: "30-40%"
    good_ctr: "3-5%"
    good_conversion: "1-3%"
  web:
    time_on_page: ">2 min"
    scroll_depth: ">60%"

# =========================
# FACTS
# =========================
facts:
  - date: 2026-04-09
    fact: IG priorituje watch time pred saves (zmena oproti 2024-2025)
    source: Filip research, Instagram creator blog

  - date: 2026-04-09
    fact: Carousel 10% engagement rate je best-performing format na CZ finance niche
    source: OneFlow internal analytics

