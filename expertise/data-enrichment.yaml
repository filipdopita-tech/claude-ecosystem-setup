# =========================
# ARES API
# =========================
ares_api:
  base_url: "https://ares.gov.cz/ekonomicke-subjekty-v-be/rest"
  dokumentace: "https://ares.gov.cz/stranky/detail-sluzby"

  endpoints:
    search:
      url: "/ekonomicke-subjekty"
      params:
        - ico: "ICO firmy"
        - obchodniJmeno: "nazev firmy (partial match)"
        - nace: "NACE kod"
        - stat: "CZ"
        - start: "offset pro strankovani"
        - pocet: "pocet zaznamu (max 1000)"
      response_fields:
        - ico, obchodniJmeno, pravniForma
        - sidlo (adresa)
        - datum_vzniku, datum_zaniku
        - nace_kody

    detail:
      url: "/ekonomicke-subjekty/{ico}"
      returns: "kompletni zaznam vcetne jednatelu, spolecniku"

    obchodni_rejstrik:
      url: "/ekonomicke-subjekty/{ico}/zapis-vr"
      returns: "jednatele, spolecnici, zakladni kapital, zmeny"
      alias: "ARES VR API"

    monitor:
      ucel: "detekce zmen u sledovanych firem"
      implementace: "ares_monitor.py — porovnava s ulozenim stavem"

  nace_kody_target:
    finance: ["64", "65", "66"]  # financni sluzby
    real_estate: ["68"]
    energy: ["35"]
    logistics: ["49", "52"]
    holding: ["70"]

  rate_limits:
    poznamka: "[ASSUMED] Public API, bez autentizace. Merne pomale. Pouzivat s 1-2s delay."
    proxy: "proxy manager refresh kazdych 6h"

  cron_schedule:
    daily: "0 2 * * *"
    monitor: "0 7 * * *"
    weekly_full: "0 1 * * 0"

# =========================
# APOLLO.IO API
# =========================
apollo:
  free_tier_credits: 75  # per month
  api_key_location: "/root/.credentials/master.env (APOLLO_API_KEY)"
  tracking: "/root/scraper/state/waterfall_usage.json"

  endpoints:
    people_search:
      url: "https://api.apollo.io/v1/mixed_people/search"
      params:
        - person_titles: ["CEO", "jednatel", "CFO", "founder"]
        - organization_domains: ["firma.cz"]
        - contact_email_status: ["verified", "unverified"]
      credits_per_call: 1

    email_reveal:
      url: "https://api.apollo.io/v1/people/match"
      params:
        - first_name, last_name
        - organization_name
        - domain
      credits_per_call: 1

  best_practices:
    - "Pouzivat az po Hunter.io (nizsi kredit limit)"
    - "Prioritizovat firmy kde Hunter selhal"
    - "Overit SMTP pred ulozenim (smtp_verifier.py)"
    - "Nemazat profily — Apollo si pamatuje co uz jsme revealili"

# =========================
# HUNTER.IO API
# =========================
hunter:
  free_tier_searches: 25  # per month
  api_key_location: "/root/.credentials/master.env (HUNTER_API_KEY)"

  endpoints:
    domain_search:
      url: "https://api.hunter.io/v2/domain-search"
      params:
        - domain: "firma.cz"
        - limit: 10
      returns: "vsechny emaily na domene + pattern"

    email_finder:
      url: "https://api.hunter.io/v2/email-finder"
      params:
        - domain: "firma.cz"
        - first_name, last_name
      returns: "email + confidence score"

    email_verifier:
      url: "https://api.hunter.io/v2/email-verifier"
      params:
        - email: "test@firma.cz"
      returns: "result: deliverable/risky/undeliverable"

  strategy:
    - "Pouzivat jako prvni (vice searches nez Apollo ma kreditu)"
    - "domain-search odhaluje pattern emailing (prvni.druhy@ vs p.druhy@)"
    - "Pattern pouzit pro generovani dalsich emailu"

# =========================
# SMTP VERIFICATION
# =========================
smtp_verifier:
  script: "/root/scraper/engine/smtp_verifier.py"
  method: "RCPT TO overeni bez odeslani mailu"

  logic:
    1: "Connect to MX server firmy"
    2: "EHLO [your-service].cz"
    3: "MAIL FROM: <verify@[your-service].cz>"
    4: "RCPT TO: <testovany@firma.cz>"
    5: "Interpret response (250=exists, 550=nexists, 421=greylisted)"

  catch_all_detection:
    problem: "Nektera domeny akceptuji VSECHNY emaily (catch-all)"
    detection: "Testovat random@firma.cz — pokud 250, je catch-all"
    handling: "Ulozit jako catch_all=true, nizsi confidence"

  results:
    valid: "RCPT TO = 250"
    invalid: "RCPT TO = 550/551/553"
    catch_all: "random test = 250"
    greylisted: "421 — zkusit znovu po 5 minutach"
    unknown: "connection timeout, blocked"

# =========================
# ISIR MONITORING
# =========================
isir:
  popis: "Insolventni rejstrik — sledovat emitenity a jednatele"
  url: "https://isir.justice.cz"
  script: "/root/scraper/engine/isir_monitor.py"

  co_sledovat:
    - "Jednatele emitentskych firem"
    - "Firmy v pipeline (pred podpisem smlouvy)"
    - "Existujici klienty (ongoing monitoring)"

  api:
    poznamka: "[ASSUMED] ISIR ma REST API — overit dokumentaci na justice.cz"
    alternativa: "Web scraping ISIR vyhledavace"

# =========================
# CUZK (KATASTR)
# =========================
cuzk:
  popis: "Katastr nemovitosti — overeni zastavnich prav pro RE emise"
  script: "/root/scraper/engine/cuzk_checker.py"
  url: "https://www.cuzk.cz"

  co_overovat:
    - "Vlastnictvi nemovitosti (je emitent skutecne vlastnik?)"
    - "Zastavni prava (jine pohledavky na zastavene NEM?)"
    - "Vecna bremena"
    - "Exekuce na nemovitosti"

# =========================
# WEB ENRICHMENT
# =========================
web_enricher:
  script: "/root/scraper/engine/web_enricher.py"
  zdroje:
    - "Firmy.cz"
    - "Zlate stranky"
    - "DuckDuckGo (search API)"
    - "Primy web crawl kontaktni stranky"

  extrahovana_data:
    - "telefon (formaty: +420, 00420, 777xxx)"
    - "email (regex na kontaktni strance)"
    - "adresa (validace vs ARES)"

  best_practices:
    - "Delay 1-2s mezi requesty"
    - "Rotate User-Agent"
    - "Timeout 10s pro pomale weby (noncritical)"
    - "Cache pozitivnich vysledku (neopakovat enrichment)"

