# PIPELINE OVERVIEW
# =========================
pipeline:
  name: [YOUR_COMPANY] Scraping Engine v4.0
  location: "/root/scraper/engine/ (VPS-SECONDARY VPS — PAUSED, migrate to VPS-PRIMARY)"
  total_records: 10067
