    domains: [oneflow-team.cz, oneflowteam.cz, helponeflow.cz, help-oneflow.cz, joinoneflow.cz]
    volume_per_day: 50  # při aktivním sendu, PAUSED (Proofpoint block)
    sequence_length: 5
    intervals_days: [0, 3, 7, 14, 21]
    ip_primary: "173.212.220.67"  # Flash — BLOCKED Proofpoint
    ip_backup: "89.221.212.203"   # Alfa — CZ IP, neblokovaný
    campaign: "OneFlow Podcast Outreach (campaign_id=2)"

  linkedin:
    status: PAUSED  # Alfa VPS down 2026-04-12
    volume_per_day: 50  # 2 runs Po-Pa: 10:00 + 15:00 UTC
    daily_limit_connects: 50
    daily_limit_messages: 10  # follow-up DMs
