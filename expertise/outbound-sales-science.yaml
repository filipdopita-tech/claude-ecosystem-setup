    bounced: 4
    replied: 0
    in_sequence: 414  # unified_contacts

  pipeline_funnel:
    sheet_firms: 10257
    tier_s_a_b: 414
    queued: 188
    sent: 163
    replied: 0
    notes: "Proofpoint block → 0 nových sendů od 2026-04-13"

# =========================
# MESSAGING RULES
# =========================
messaging_rules:
  do:
    - "Personalizuj specifický detail z profilu"
    - "Začni hodnotou, ne ask"
    - "Čísla místo přídavných jmen"
    - "Krátké věty, jeden bod/odstavec"
    - "Konči otázkou nebo jasným next step"
    - "Příloha nebo odkaz max 1 v celém emailu"

  dont:
    - "'Dovoluji si' nebo 'Rád bych' jako opening"
    - "Generic templates bez personalizace"
    - "Fake urgency"
    - "Stack claimy bez důkazů"
    - "Víceodstavcové zdi textu"
    - "'Mám pro vás exkluzivní nabídku' v předmětu"
    - "Re: v předmětu prvního emailu"

  subject_line_formulas:
    good:
      - "{Firma} + {specifický insight}"
      - "Otázka na {jejich problém}"
      - "{Příloha nebo data} pro {Firma}"
    bad:
      - "Exkluzivní nabídka!!!"
      - "Oportunita spolupráce"
      - "FW: Důležité"

# =========================
# LINKEDIN SEQUENCE
# =========================
linkedin_sequence:
  connect_note_max_chars: 300
  step_1_connect: "Personalized note — 1 věta proč se chci propojit"
  step_2_thanks: "Thanks after accept — bez pitche (3-5 dní)"
  step_3_value: "Sdílení hodnoty — insight, report (7 dní)"
  step_4_value_2: "Druhý insight + soft mention [YOUR_COMPANY] (14 dní)"
  step_5_meeting_ask: "Přímá žádost o call (21 dní)"

